<script type="text/babel">
const { useState, useMemo, useCallback, useRef } = React;

const COP = v => Math.round(v).toLocaleString('es-CO');
const uid = () => Math.random().toString(36).slice(2,9);
const clone = o => JSON.parse(JSON.stringify(o));

function recalcAPU(apu) {
  apu.materiales = apu.materiales.map(m => ({...m, subtotal: m.precioUnitario * m.cantidad}));
  apu.manoObra = apu.manoObra.map(mo => ({...mo, subtotal: mo.valorHora * mo.horasUnd}));
  apu.equipos = apu.equipos.map(eq => ({...eq, subtotal: eq.tarifa * eq.cantidad}));
  apu.subtotalMateriales = apu.materiales.reduce((s,m)=>s+m.subtotal,0);
  apu.subtotalManoObra = apu.manoObra.reduce((s,m)=>s+m.subtotal,0);
  apu.subtotalEquipos = apu.equipos.reduce((s,e)=>s+e.subtotal,0);
  apu.costoDirecto = apu.subtotalMateriales + apu.subtotalManoObra + apu.subtotalEquipos;
  return apu;
}
function propagateMaterialPrice(apus,desc,newPrice){
  return apus.map(apu=>{
    if(!apu.materiales.some(m=>m.descripcion===desc))return apu;
    const u=clone(apu);
    u.materiales=u.materiales.map(m=>m.descripcion===desc?{...m,precioUnitario:newPrice}:m);
    return recalcAPU(u);
  });
}
function propagateMOPrice(apus,desc,newJ,newVH){
  return apus.map(apu=>{
    if(!apu.manoObra.some(m=>m.descripcion===desc))return apu;
    const u=clone(apu);
    u.manoObra=u.manoObra.map(m=>m.descripcion===desc?{...m,jornal:newJ,valorHora:newVH}:m);
    return recalcAPU(u);
  });
}
function propagateEquipoTarifa(apus,desc,newTarifa){
  return apus.map(apu=>{
    if(!apu.equipos.some(e=>e.descripcion===desc))return apu;
    const u=clone(apu);
    u.equipos=u.equipos.map(e=>e.descripcion===desc?{...e,tarifa:newTarifa}:e);
    return recalcAPU(u);
  });
}

function NumCell({value,onSave,style={},align='right'}){
  const [ed,setEd]=useState(false);
  const [draft,setDraft]=useState('');
  const ref=useRef();
  const start=()=>{setDraft(String(value));setEd(true);setTimeout(()=>ref.current&&ref.current.select(),10)};
  const commit=()=>{const n=parseFloat(draft.replace(',','.'));if(!isNaN(n))onSave(n);setEd(false)};
  if(ed)return(
    <td style={{padding:'2px 6px',...style}}>
      <input ref={ref} value={draft} onChange={e=>setDraft(e.target.value)}
        onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setEd(false);}}
        style={{width:'100%',background:'#fff9e6',border:'1.5px solid #d4a017',borderRadius:3,padding:'2px 4px',textAlign:'right',fontSize:'inherit',fontFamily:'inherit'}}/>
    </td>
  );
  return <td onClick={start} style={{padding:'4px 10px',textAlign:align,cursor:'pointer',userSelect:'none',...style}} title="Clic para editar">{COP(value)}</td>;
}

function TxtInline({value,onChange}){
  const [ed,setEd]=useState(false);
  const [draft,setDraft]=useState('');
  const ref=useRef();
  const start=()=>{setDraft(value);setEd(true);setTimeout(()=>ref.current&&ref.current.select(),10)};
  const commit=()=>{onChange(draft);setEd(false)};
  if(ed)return(
    <input ref={ref} value={draft} onChange={e=>setDraft(e.target.value)}
      onBlur={commit} onKeyDown={e=>{if(e.key==='Enter')commit();if(e.key==='Escape')setEd(false);}}
      style={{width:'100%',background:'#fff9e6',border:'1.5px solid #d4a017',borderRadius:3,padding:'2px 6px',fontSize:'inherit',fontFamily:'inherit'}}/>
  );
  return <span onClick={start} style={{cursor:'pointer',display:'block',padding:'2px 4px'}} title="Clic para editar">{value||'—'}</span>;
}

function NumInput({value,onChange,style={}}){
  return <input type="number" value={value} onChange={e=>onChange(parseFloat(e.target.value)||0)}
    style={{width:'100%',padding:'4px 6px',border:'1px solid #d0d5dd',borderRadius:4,fontSize:13,...style}}/>;
}
function TxtInput({value,onChange,style={},placeholder=''}){
  return <input type="text" value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)}
    style={{width:'100%',padding:'4px 6px',border:'1px solid #d0d5dd',borderRadius:4,fontSize:13,...style}}/>;
}

  const updateAPU=useCallback((id,fn)=>setApus(prev=>prev.map(a=>a.id===id?fn(clone(a)):a)),[]);

  return(

        </div>

                background:tab===i?'#fff':'transparent',color:tab===i?'#0d2137':'#8fb3d4',

        {tab===1&&<TabDetalle apu={selectedAPU} apus={apus} setApus={setApus} setTab={setTab}

      </div>
    </div>
  );

  return(
    <div style={{display:'flex',justifyContent:'space-between',gap:16,alignItems:'center',padding:'2px 0'}}>
      <span style={{fontSize:12,color:'#4a5568'}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {ed?(
          <input value={draft} onChange={e=>setDraft(e.target.value)} autoFocus
            onBlur={()=>{const v=parseFloat(draft);if(!isNaN(v))onPct(v);setEd(false);}}
            onKeyDown={e=>{if(e.key==='Enter'){const v=parseFloat(draft);if(!isNaN(v))onPct(v);setEd(false);}}}
            style={{width:52,padding:'2px 4px',border:'1px solid #d4a017',borderRadius:3,fontSize:12,textAlign:'right'}}/>
        ):(
          <span onClick={()=>{setDraft(String(pct));setEd(true);}}
            style={{fontSize:12,color:'#d4a017',cursor:'pointer',fontWeight:600,textDecoration:'underline dotted'}}>{pct}%</span>
        )}
        <span style={{fontSize:12,color:'#1a2332',minWidth:90,textAlign:'right'}}>$ {COP(value)}</span>
      </div>
    </div>
  );
}

function TabDetalle({apu,apus,setApus,setTab,onOpenAPU,updateAPU,catalogs}){
  if(!apu)return(
    <div style={{textAlign:'center',padding:'60px 20px',color:'#6b7a8d'}}>
      <div style={{fontSize:48,marginBottom:12}}>📋</div>
      <div style={{fontSize:16,fontWeight:600}}>Selecciona un ítem del Resumen para ver su APU</div>
      <button onClick={()=>setTab(0)} style={{marginTop:16,padding:'8px 18px',background:'#1a5fa6',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontWeight:600}}>← Ir al Resumen</button>
    </div>
  );

  const update=fn=>setApus(prev=>prev.map(a=>a.id===apu.id?recalcAPU(fn(clone(a))):a));
  const idx=apus.findIndex(a=>a.id===apu.id);

  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={()=>setTab(0)} style={{padding:'6px 12px',background:'#e8f0fc',color:'#1a5fa6',border:'none',borderRadius:5,cursor:'pointer',fontSize:12,fontWeight:600}}>← Resumen</button>
        <button onClick={()=>idx>0&&onOpenAPU(apus[idx-1].id)} disabled={idx<=0}
          style={{padding:'6px 10px',background:idx>0?'#e8f0fc':'#f0f0f0',color:idx>0?'#1a5fa6':'#aaa',border:'none',borderRadius:5,cursor:idx>0?'pointer':'default',fontSize:12}}>‹ Ant.</button>
        <button onClick={()=>idx<apus.length-1&&onOpenAPU(apus[idx+1].id)} disabled={idx>=apus.length-1}
          style={{padding:'6px 10px',background:idx<apus.length-1?'#e8f0fc':'#f0f0f0',color:idx<apus.length-1?'#1a5fa6':'#aaa',border:'none',borderRadius:5,cursor:idx<apus.length-1?'pointer':'default',fontSize:12}}>Sig. ›</button>
        <span style={{marginLeft:'auto',fontSize:12,color:'#6b7a8d',flexShrink:0}}>{idx+1} / {apus.length}</span>
      </div>

      <div style={{background:'linear-gradient(135deg,#0d2137,#1a3a5c)',borderRadius:8,padding:'16px 20px',marginBottom:16,color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:11,color:'#8fb3d4',letterSpacing:.5,marginBottom:4}}>{apu.id} · Ítem {apu.numero}</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:18,lineHeight:1.3}}>{apu.descripcion}</div>
        </div>
        <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
          {[['Unidad',apu.unidad],['Materiales',`$ ${COP(apu.subtotalMateriales)}`],['Mano de Obra',`$ ${COP(apu.subtotalManoObra)}`],['Equipos',`$ ${COP(apu.subtotalEquipos)}`]].map(([l,v])=>(
            <div key={l} style={{textAlign:'right'}}>
              <div style={{fontSize:9,color:'#8fb3d4',letterSpacing:.3,textTransform:'uppercase'}}>{l}</div>
              <div style={{fontSize:12,fontWeight:500,color:'#fff'}}>{v}</div>
            </div>
          ))}
          <div style={{textAlign:'right',borderLeft:'1px solid rgba(255,255,255,.2)',paddingLeft:16}}>
            <div style={{fontSize:9,color:'#d4a017',letterSpacing:.3,textTransform:'uppercase'}}>COSTO DIRECTO</div>
            <div style={{fontSize:18,fontWeight:700,color:'#d4a017'}}>$ {COP(apu.costoDirecto)}</div>
          </div>
        </div>
      </div>

      <APUSection title="1. MATERIALES" color="#1a5fa6" items={apu.materiales} subtotal={apu.subtotalMateriales}
        cols={['Descripción','Unidad','Precio Unit. (COP)','Cantidad','Subtotal (COP)']}
        renderRow={(m,i)=>(
          <tr key={i} style={{background:i%2?'#f7f9fc':'#fff',borderBottom:'1px solid #e8eef5'}}>
            <td style={{padding:'5px 10px'}}><TxtInline value={m.descripcion} onChange={v=>update(a=>{a.materiales[i].descripcion=v;return a;})}/></td>
            <td style={{padding:'5px 8px',minWidth:60}}><TxtInline value={m.unidad} onChange={v=>update(a=>{a.materiales[i].unidad=v;return a;})}/></td>
            <NumCell value={m.precioUnitario} onSave={v=>update(a=>{a.materiales[i].precioUnitario=v;return a;})}/>
            <NumCell value={m.cantidad} onSave={v=>update(a=>{a.materiales[i].cantidad=v;return a;})}/>
            <td style={{padding:'5px 10px',textAlign:'right',fontWeight:500,background:'#eef4ff'}}>{COP(m.subtotal)}</td>
            <td style={{padding:'4px 6px'}}><button onClick={()=>update(a=>{a.materiales.splice(i,1);return a;})} style={{background:'none',border:'none',color:'#e05252',cursor:'pointer',fontSize:15}}>✕</button></td>
          </tr>
        )}
        onAdd={()=>update(a=>{a.materiales.push({descripcion:'Nuevo material',unidad:'und',precioUnitario:0,cantidad:1,subtotal:0});return a;})}/>

      <APUSection title="2. MANO DE OBRA" color="#16763e" items={apu.manoObra} subtotal={apu.subtotalManoObra}
        cols={['Descripción','Jornal/día (COP)','Valor hora (COP)','Horas/Und','Subtotal (COP)']}
        renderRow={(m,i)=>(
          <tr key={i} style={{background:i%2?'#f7fcf9':'#fff',borderBottom:'1px solid #e0eeea'}}>
            <td style={{padding:'5px 10px'}}><TxtInline value={m.descripcion} onChange={v=>update(a=>{a.manoObra[i].descripcion=v;return a;})}/></td>
            <NumCell value={m.jornal} onSave={v=>update(a=>{a.manoObra[i].jornal=v;a.manoObra[i].valorHora=Math.round(v/8);return a;})}/>
            <td style={{padding:'5px 10px',textAlign:'right',color:'#444',background:'#eefaf4',fontSize:13}}>{COP(m.valorHora)}</td>
            <NumCell value={m.horasUnd} onSave={v=>update(a=>{a.manoObra[i].horasUnd=v;return a;})}/>
            <td style={{padding:'5px 10px',textAlign:'right',fontWeight:500,background:'#eefaf4'}}>{COP(m.subtotal)}</td>
            <td style={{padding:'4px 6px'}}><button onClick={()=>update(a=>{a.manoObra.splice(i,1);return a;})} style={{background:'none',border:'none',color:'#e05252',cursor:'pointer',fontSize:15}}>✕</button></td>
          </tr>
        )}
        onAdd={()=>update(a=>{a.manoObra.push({descripcion:'Nuevo cargo',jornal:120000,valorHora:15000,horasUnd:1,subtotal:0});return a;})}/>

      <APUSection title="3. EQUIPOS Y HERRAMIENTA" color="#7a3e1a" items={apu.equipos} subtotal={apu.subtotalEquipos}
        cols={['Descripción','Unidad','Tarifa (COP)','Cantidad','Subtotal (COP)']}
        renderRow={(m,i)=>(
          <tr key={i} style={{background:i%2?'#fdf9f5':'#fff',borderBottom:'1px solid #f0e8de'}}>
            <td style={{padding:'5px 10px'}}><TxtInline value={m.descripcion} onChange={v=>update(a=>{a.equipos[i].descripcion=v;return a;})}/></td>
            <td style={{padding:'5px 8px',minWidth:60}}><TxtInline value={m.unidad} onChange={v=>update(a=>{a.equipos[i].unidad=v;return a;})}/></td>
            <NumCell value={m.tarifa} onSave={v=>update(a=>{a.equipos[i].tarifa=v;return a;})}/>
            <NumCell value={m.cantidad} onSave={v=>update(a=>{a.equipos[i].cantidad=v;return a;})}/>
            <td style={{padding:'5px 10px',textAlign:'right',fontWeight:500,background:'#fdf5ee'}}>{COP(m.subtotal)}</td>
            <td style={{padding:'4px 6px'}}><button onClick={()=>update(a=>{a.equipos.splice(i,1);return a;})} style={{background:'none',border:'none',color:'#e05252',cursor:'pointer',fontSize:15}}>✕</button></td>
          </tr>
        )}
        onAdd={()=>update(a=>{a.equipos.push({descripcion:'Nuevo equipo',unidad:'día',tarifa:0,cantidad:1,subtotal:0});return a;})}/>
    </div>
  );
}

function APUSection({title,color,items,subtotal,cols,renderRow,onAdd}){
  return(
    <div style={{background:'#fff',borderRadius:8,boxShadow:'0 1px 6px rgba(0,0,0,.07)',marginBottom:12,overflow:'hidden'}}>
      <div style={{background:color,padding:'8px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontWeight:700,fontSize:13,color:'#fff',letterSpacing:.5}}>{title}</span>
        <span style={{fontSize:12,color:'rgba(255,255,255,.8)'}}>Subtotal: <strong style={{color:'#fff'}}>$ {COP(subtotal)}</strong></span>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{background:'#f3f6fa',borderBottom:'2px solid #e0e8f0'}}>
              {cols.map(c=><th key={c} style={{padding:'7px 10px',textAlign:c.includes('(COP)')||c==='Cantidad'?'right':'left',fontSize:11,fontWeight:600,color:'#4a5568',letterSpacing:.3,whiteSpace:'nowrap'}}>{c}</th>)}
              <th style={{width:32}}/>
            </tr>
          </thead>
          <tbody>{items.map((m,i)=>renderRow(m,i))}</tbody>
        </table>
      </div>
      <div style={{padding:'8px 12px',borderTop:'1px solid #e8eef5'}}>
        <button onClick={onAdd} style={{padding:'4px 12px',background:'transparent',border:`1px dashed ${color}`,color,borderRadius:4,cursor:'pointer',fontSize:12,fontWeight:600}}>+ Agregar fila</button>
      </div>
    </div>
  );
}

function NuevoAPUForm({catalogs,onSave,onCancel}){
  const [desc,setDesc]=useState('');
  const [unidad,setUnidad]=useState('m²');
  const [mats,setMats]=useState([{descripcion:'',unidad:'und',precioUnitario:0,cantidad:1}]);
  const [mos,setMos]=useState([{descripcion:'',jornal:120000,valorHora:15000,horasUnd:1}]);
  const [eqs,setEqs]=useState([{descripcion:'',unidad:'día',tarifa:0,cantidad:1}]);

  const save=()=>{
    if(!desc.trim())return alert('Ingresa una descripción');
    const m2=mats.filter(m=>m.descripcion).map(m=>({...m,subtotal:m.precioUnitario*m.cantidad}));
    const mo2=mos.filter(m=>m.descripcion).map(m=>({...m,subtotal:m.valorHora*m.horasUnd}));
    const eq2=eqs.filter(e=>e.descripcion).map(e=>({...e,subtotal:e.tarifa*e.cantidad}));
    const sm=m2.reduce((s,x)=>s+x.subtotal,0);
    const smo=mo2.reduce((s,x)=>s+x.subtotal,0);
    const seq=eq2.reduce((s,x)=>s+x.subtotal,0);
    onSave({id:`APU-${uid()}`,numero:null,descripcion:desc,unidad,cantidad:1,
      materiales:m2,manoObra:mo2,equipos:eq2,
      subtotalMateriales:sm,subtotalManoObra:smo,subtotalEquipos:seq,costoDirecto:sm+smo+seq});
  };

  const SectionBuilder=({title,items,set,fields,newItem})=>(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:700,color:'#0d2137',marginBottom:4,letterSpacing:.5}}>{title}</div>
      {items.map((item,i)=>(
        <div key={i} style={{display:'flex',gap:6,marginBottom:4,alignItems:'flex-end'}}>
          {fields.map(f=>(
            <div key={f.k} style={{flex:f.w?0:f.k==='descripcion'?3:1,width:f.w,minWidth:f.w}}>
              {i===0&&<div style={{fontSize:10,color:'#888',marginBottom:2}}>{f.label}</div>}
              {f.txt?<TxtInput value={item[f.k]} onChange={v=>set(p=>{const n=[...p];n[i]={...n[i],[f.k]:v};return n;})}/>
                    :<NumInput value={item[f.k]} onChange={v=>set(p=>{const n=[...p];n[i]={...n[i],[f.k]:v};return n;})}/>}
            </div>
          ))}
          <button onClick={()=>set(p=>p.filter((_,j)=>j!==i))}
            style={{background:'none',border:'none',color:'#e05252',cursor:'pointer',fontSize:15,paddingBottom:2}}>✕</button>
        </div>
      ))}
      <button onClick={()=>set(p=>[...p,newItem])}
        style={{fontSize:11,color:'#1a5fa6',background:'none',border:'1px dashed #1a5fa6',borderRadius:3,padding:'2px 8px',cursor:'pointer',marginTop:2}}>+ Agregar</button>
    </div>
  );

  return(
    <div style={{background:'#fff',borderRadius:8,boxShadow:'0 4px 20px rgba(0,0,0,.12)',padding:20,marginBottom:16,border:'2px solid #d4a017'}}>
      <div style={{fontWeight:700,fontSize:15,color:'#0d2137',marginBottom:12,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5}}>NUEVO ANÁLISIS DE PRECIOS UNITARIOS</div>
      <div style={{display:'flex',gap:12,marginBottom:12}}>
        <div style={{flex:3}}>
          <div style={{fontSize:11,fontWeight:600,color:'#6b7a8d',marginBottom:3}}>DESCRIPCIÓN</div>
          <TxtInput value={desc} onChange={setDesc} placeholder="Descripción completa del ítem..."/>
        </div>
        <div style={{width:100}}>
          <div style={{fontSize:11,fontWeight:600,color:'#6b7a8d',marginBottom:3}}>UNIDAD</div>
          <TxtInput value={unidad} onChange={setUnidad}/>
        </div>
      </div>
      <SectionBuilder title="MATERIALES" items={mats} set={setMats}
        fields={[{k:'descripcion',label:'Descripción',txt:true},{k:'unidad',label:'Un.',txt:true,w:60},{k:'precioUnitario',label:'Precio Unit.'},{k:'cantidad',label:'Cantidad'}]}
        newItem={{descripcion:'',unidad:'und',precioUnitario:0,cantidad:1}}/>
      <SectionBuilder title="MANO DE OBRA" items={mos} set={setMos}
        fields={[{k:'descripcion',label:'Descripción',txt:true},{k:'jornal',label:'Jornal/día'},{k:'horasUnd',label:'Horas/Und'}]}
        newItem={{descripcion:'',jornal:120000,valorHora:15000,horasUnd:1}}/>
      <SectionBuilder title="EQUIPOS Y HERRAMIENTA" items={eqs} set={setEqs}
        fields={[{k:'descripcion',label:'Descripción',txt:true},{k:'unidad',label:'Un.',txt:true,w:60},{k:'tarifa',label:'Tarifa'},{k:'cantidad',label:'Cantidad'}]}
        newItem={{descripcion:'',unidad:'día',tarifa:0,cantidad:1}}/>
      <div style={{display:'flex',gap:10,marginTop:16}}>
        <button onClick={save} style={{padding:'8px 20px',background:'#d4a017',color:'#fff',border:'none',borderRadius:6,fontWeight:700,cursor:'pointer',fontSize:13}}>Guardar APU</button>
        <button onClick={onCancel} style={{padding:'8px 16px',background:'#f0f3f7',color:'#555',border:'none',borderRadius:6,cursor:'pointer',fontSize:13}}>Cancelar</button>
      </div>
    </div>
  );
}

function TabCatalogos({catalogs,setCatalogs,apus,setApus}){
  const [cat,setCat]=useState(0);
  const [search,setSearch]=useState('');
  const cats=['Materiales','Mano de Obra','Equipos'];

  const srcKey=cat===0?'materiales':cat===1?'manoObra':'equipos';
  const filtered=useMemo(()=>{
    const src=catalogs[srcKey];
    return search?src.filter(i=>i.descripcion.toLowerCase().includes(search.toLowerCase())):src;
  },[cat,catalogs,search,srcKey]);

  const updateItem=(id,field,value)=>{
    const oldItem=catalogs[srcKey].find(i=>i.id===id);
    if(!oldItem)return;
    setCatalogs(prev=>({...prev,[srcKey]:prev[srcKey].map(i=>i.id===id?{...i,[field]:value}:i)}));
    if(cat===0&&field==='precioUnitario') setApus(p=>propagateMaterialPrice(p,oldItem.descripcion,value));
    if(cat===1&&field==='jornal'){const vh=Math.round(value/8);setApus(p=>propagateMOPrice(p,oldItem.descripcion,value,vh));}
    if(cat===2&&field==='tarifa') setApus(p=>propagateEquipoTarifa(p,oldItem.descripcion,value));
  };

  const addItem=()=>{
    const newItem=cat===0?{id:uid(),descripcion:'Nuevo material',unidad:'und',precioUnitario:0}
      :cat===1?{id:uid(),descripcion:'Nuevo cargo',jornal:120000,valorHora:15000}
      :{id:uid(),descripcion:'Nuevo equipo',unidad:'día',tarifa:0};
    setCatalogs(prev=>({...prev,[srcKey]:[...prev[srcKey],newItem]}));
  };

  const delItem=id=>setCatalogs(prev=>({...prev,[srcKey]:prev[srcKey].filter(i=>i.id!==id)}));

  return(
    <div>
      <div style={{display:'flex',gap:0,marginBottom:16,background:'#fff',borderRadius:6,boxShadow:'0 1px 4px rgba(0,0,0,.06)',padding:4,width:'fit-content'}}>
        {cats.map((t,i)=>(
          <button key={i} onClick={()=>{setCat(i);setSearch('');}}
            style={{padding:'7px 18px',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,borderRadius:4,
              background:cat===i?'#0d2137':'transparent',color:cat===i?'#fff':'#6b7a8d'}}>
            {t} <span style={{fontSize:11,color:cat===i?'#8fb3d4':'#bbb',fontWeight:400}}>({(cat===i?filtered:cat===0?catalogs.materiales:cat===1?catalogs.manoObra:catalogs.equipos).length})</span>
          </button>
        ))}
      </div>

      <div style={{display:'flex',gap:12,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{position:'relative'}}>
          <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'#888'}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar en catálogo..."
            style={{padding:'7px 10px 7px 28px',border:'1px solid #c8d5e8',borderRadius:5,fontSize:13,outline:'none',width:260}}/>
        </div>
        <button onClick={addItem} style={{padding:'7px 16px',background:'#d4a017',color:'#fff',border:'none',borderRadius:5,fontWeight:600,cursor:'pointer',fontSize:13}}>+ Agregar</button>
        <span style={{fontSize:11,color:'#8aa',marginLeft:'auto'}}>💡 Actualizar precios aquí los refleja en todos los APUs automáticamente</span>
      </div>

      <div style={{background:'#fff',borderRadius:8,boxShadow:'0 1px 8px rgba(0,0,0,.07)',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{background:'#0d2137',color:'#fff'}}>
              {cat===0&&['#','Descripción','Unidad','Precio Unitario (COP)',''].map((h,i)=><th key={i} style={{padding:'9px 12px',textAlign:i===3?'right':'left',fontSize:11,letterSpacing:.3,fontWeight:600}}>{h}</th>)}
              {cat===1&&['#','Descripción','Jornal/día (COP)','Valor Hora (COP)',''].map((h,i)=><th key={i} style={{padding:'9px 12px',textAlign:i>=2&&i<=3?'right':'left',fontSize:11,letterSpacing:.3,fontWeight:600}}>{h}</th>)}
              {cat===2&&['#','Descripción','Unidad','Tarifa (COP)',''].map((h,i)=><th key={i} style={{padding:'9px 12px',textAlign:i===3?'right':'left',fontSize:11,letterSpacing:.3,fontWeight:600}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {filtered.map((item,i)=>(
              <tr key={item.id} style={{background:i%2?'#f7f9fc':'#fff',borderBottom:'1px solid #e8eef5'}}>
                <td style={{padding:'5px 10px',color:'#9aa',fontSize:11,width:40}}>{i+1}</td>
                <td style={{padding:'5px 10px'}}>
                  <TxtInline value={item.descripcion} onChange={v=>updateItem(item.id,'descripcion',v)}/>
                </td>
                {cat===0&&<>
                  <td style={{padding:'5px 8px',width:80}}>
                    <TxtInline value={item.unidad} onChange={v=>updateItem(item.id,'unidad',v)}/>
                  </td>
                  <td style={{padding:'5px 10px',width:160}}>
                    <NumInput value={item.precioUnitario} onChange={v=>updateItem(item.id,'precioUnitario',v)}/>
                  </td>
                </>}
                {cat===1&&<>
                  <td style={{padding:'5px 10px',width:150}}>
                    <NumInput value={item.jornal} onChange={v=>updateItem(item.id,'jornal',v)}/>
                  </td>
                  <td style={{padding:'5px 10px',textAlign:'right',color:'#444',width:130,fontSize:13}}>{COP(item.jornal/8)}</td>
                </>}
                {cat===2&&<>
                  <td style={{padding:'5px 8px',width:80}}>
                    <TxtInline value={item.unidad} onChange={v=>updateItem(item.id,'unidad',v)}/>
                  </td>
                  <td style={{padding:'5px 10px',width:150}}>
                    <NumInput value={item.tarifa} onChange={v=>updateItem(item.id,'tarifa',v)}/>
                  </td>
                </>}
                <td style={{padding:'5px 8px',textAlign:'center',width:40}}>
                  <button onClick={()=>delItem(item.id)} style={{background:'none',border:'none',color:'#e05252',cursor:'pointer',fontSize:15}}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:24,textAlign:'center',color:'#aaa',fontSize:13}}>Sin resultados para "{search}"</div>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
